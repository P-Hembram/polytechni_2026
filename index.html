<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>polytechnic_2026</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:10px;
}

.container{
    max-width:800px;
    margin:auto;
}

.question-box{
    background:white;
    padding:15px;
    margin:12px 0;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
    border: 1px solid black;
}

.option{
    display:block;
    width:100%;
    margin:6px 0;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    background:white;
    cursor:pointer;
    text-align:left;
}

.correct{
    background:#28a745 !important;
    color:white;
}

.wrong{
    background:#dc3545 !important;
    color:white;
}

.topbar{
    /* position:sticky; */
    top:0;
    background:white;
    padding:10px;
    z-index:100;
    margin-bottom:10px;
    /* border-radius:10px; */
        box-shadow: 0 2px 5px rgb(0 0 0 / 33%);
    border-bottom-left-radius: 10px;
    border-bottom-right-radius: 10px;
}

input{
    width:100%;
    padding:10px;
    box-sizing:border-box;
}

button{
    padding:10px 15px;
    margin-top:8px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

<div class="topbar">
<!-- <input
type="text"
id="search"
placeholder="Question Search..."
onkeyup="filterQuestions()"> -->

<h2 style="text-align: center;">डिप्लोमा के लिए सबसे महत्वपूर्ण प्रश्न| </h2>

<button onclick="resetAnswers()">
Reset All Answers
</button>

<p id="progress"></p>
</div>

<div id="quiz"></div>

</div>

<script src="script.js"></script>

</body>
</html>
